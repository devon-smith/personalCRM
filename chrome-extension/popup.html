<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }

    .header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid #f0eeeb;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.connected { background: #059669; }
    .status-dot.disconnected { background: #dc2626; }

    .status-text { color: #7b8189; }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #f0eeeb;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #9ba1a8;
      margin-bottom: 8px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
    }

    .stat-label { font-size: 12px; color: #4a4e54; }
    .stat-value { font-size: 12px; font-weight: 600; color: #1a1a1a; }

    .session-badge {
      display: inline-block;
      background: #059669;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
      margin-left: 6px;
    }

    .url-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .url-input {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid #e2e4e8;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      outline: none;
    }
    .url-input:focus { border-color: #1a1a1a; }

    .btn-save {
      padding: 5px 10px;
      border: 1px solid #e2e4e8;
      border-radius: 6px;
      background: #fff;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      color: #4a4e54;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-save:hover { background: #f5f6f8; }

    .links {
      padding: 12px 16px;
    }

    .link-btn {
      display: block;
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #e2e4e8;
      border-radius: 8px;
      background: #fff;
      font-size: 12px;
      font-weight: 500;
      color: #4a4e54;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: background 0.15s;
      margin-bottom: 6px;
      text-decoration: none;
    }
    .link-btn:hover { background: #f5f6f8; }
    .link-btn:last-child { margin-bottom: 0; }

    .footer {
      padding: 8px 16px 12px;
      text-align: center;
    }

    .footer-text {
      font-size: 10px;
      color: #b5bac0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Personal CRM <span class="session-badge" id="session-badge" style="display:none">0</span></h1>
    <div class="status">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text" id="status-text">Checking...</span>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Today</div>
    <div class="stat-row">
      <span class="stat-label">Profiles synced</span>
      <span class="stat-value" id="stat-profiles">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Messages logged</span>
      <span class="stat-value" id="stat-messages">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Feed items captured</span>
      <span class="stat-value" id="stat-feed">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Enrichments</span>
      <span class="stat-value" id="stat-enrichments">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Contacts in CRM</span>
      <span class="stat-value" id="stat-contacts">&ndash;</span>
    </div>
  </div>

  <div class="section">
    <div class="section-label">CRM URL</div>
    <div class="url-row">
      <input type="text" class="url-input" id="url-input" placeholder="http://localhost:3003" />
      <button class="btn-save" id="url-save">Save</button>
    </div>
  </div>

  <div class="section">
    <div class="section-label">API Token <span id="token-status" style="font-size:10px;text-transform:none;letter-spacing:0"></span></div>
    <div class="url-row">
      <input type="password" class="url-input" id="token-input" placeholder="Paste token from CRM settings" />
      <button class="btn-save" id="token-save">Set</button>
    </div>
  </div>

  <div class="links">
    <a class="link-btn" id="open-crm" href="#" target="_blank">Open CRM &#8599;</a>
    <button class="link-btn" id="open-followups">Follow-ups (<span id="followup-count">&ndash;</span>)</button>
  </div>

  <div class="footer">
    <span class="footer-text">Personal CRM v1.1</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
